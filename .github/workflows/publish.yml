name: Publish Images

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Which image to publish"
        required: true
        type: choice
        options:
          - both
          - agent
          - vm

env:
  REGISTRY: ghcr.io

jobs:
  build-agent:
    if: inputs.image == 'both' || inputs.image == 'agent'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: image
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/onecli/nanoclaw-agent
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ./container
          file: ./container/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/onecli/nanoclaw-agent,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=agent-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=agent-${{ matrix.suffix }}
      - run: mkdir -p /tmp/digests && touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      - uses: actions/upload-artifact@v4
        with:
          name: agent-digest-${{ matrix.suffix }}
          path: /tmp/digests/*
          retention-days: 1

  merge-agent:
    if: inputs.image == 'both' || inputs.image == 'agent'
    needs: build-agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: agent-digest-*
          merge-multiple: true
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/onecli/nanoclaw-agent
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}
      - working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/onecli/nanoclaw-agent@sha256:%s ' *)

  build-vm:
    if: inputs.image == 'both' || inputs.image == 'vm'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: image
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vm
          push: true
          tags: |
            ${{ env.REGISTRY }}/onecli/nanoclaw-vm:latest
            ${{ env.REGISTRY }}/onecli/nanoclaw-vm:${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=vm
          cache-to: type=gha,mode=max,scope=vm
